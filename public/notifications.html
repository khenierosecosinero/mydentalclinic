<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .main-content { margin-left: 250px; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); padding: 16px; }
    .item { border-bottom: 1px solid #eee; padding: 10px 0; }
    .item:last-child { border-bottom: none; }
    .meta { font-size: 12px; color: #6b7280; }
    button { padding: 6px 10px; border: none; border-radius: 8px; background: #6d28d9; color: #fff; cursor: pointer; }
    @media (max-width: 768px) { .main-content { margin-left: 60px; } }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <div class="menu-item" onclick="location.href='dashboard.html'"><span class="icon">🏠</span><span class="text">Dashboard</span></div>
      <div class="menu-item" onclick="location.href='book-appointment.html'"><span class="icon">📅</span><span class="text">Book Appointment</span></div>
      <div class="menu-item" onclick="location.href='my-appointments.html'"><span class="icon">📋</span><span class="text">My Appointments</span></div>
      <div class="menu-item" onclick="location.href='settings.html'"><span class="icon">⚙️</span><span class="text">Settings</span></div>
      <div class="submenu">
        <div class="menu-item" onclick="location.href='faq_section.html'"><span class="icon">❓</span><span class="text">FAQ</span></div>
        <div class="menu-item" onclick="location.href='contact_help.html'"><span class="icon">📞</span><span class="text">Help Center</span></div>
      </div>
      <div class="menu-item" onclick="location.href='profile.html'"><span class="icon">👤</span><span class="text">Profile</span></div>
    </div>
    <div class="menu-item" id="logout"><span class="icon">🚪</span><span class="text">Logout</span></div>
  </div>

  <main class="main-content">
    <div class="card">
      <h1>Notifications</h1>
      <div id="notificationList"></div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const API_BASE = 'http://localhost:3000';
    function decodePayload(jwt) {
      try { return JSON.parse(atob(jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); } catch { return null; }
    }
    async function authFetch(url, options = {}) {
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      return fetch(url, { ...options, headers });
    }
    async function loadNotifications() {
      const res = await authFetch(`${API_BASE}/notifications`);
      const notifications = await res.json();
      document.getElementById('notificationList').innerHTML = notifications.map(n => `
        <div class="item">
          <div><strong>${n.title}</strong> ${n.isRead ? '' : '<span style="color:#dc2626">(new)</span>'}</div>
          <div>${n.message}</div>
          <div class="meta">${new Date(n.createdAt).toLocaleString()}</div>
          ${n.isRead ? `<button onclick="markUnread(${n.id})">Mark unread</button>` : `<button onclick="markRead(${n.id})">Mark read</button>`}
        </div>
      `).join('') || '<div>No notifications.</div>';
    }
    async function markRead(id) { await authFetch(`${API_BASE}/notifications/${id}/read`, { method: 'PUT' }); loadNotifications(); }
    async function markUnread(id) { await authFetch(`${API_BASE}/notifications/${id}/unread`, { method: 'PUT' }); loadNotifications(); }
    window.markRead = markRead;
    window.markUnread = markUnread;

    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = 'login.html';
    });

    (async () => {
      if (!token) { window.location.href = 'login.html'; return; }
      const payload = decodePayload(token);
      if (payload?.role === 'admin') { window.location.href = 'admin.html'; return; }
      await loadNotifications();
    })();
  </script>
</body>
</html>
