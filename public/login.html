<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #f3e8ff 0%, #dfc6ff 40%, #c8a1ff 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      color: #1f2937;
    }

    .container {
      width: min(920px, 94vw);
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 520px;
    }

    .form-box {
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .form-box h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.02em;
      color: #111827;
    }

    .form-box p {
      margin: 12px 0 32px;
      color: #4b5563;
      line-height: 1.5;
    }

    .form-field {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      background: #f3f4f6;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    .form-field input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 15px;
      color: #111827;
    }

    .form-field svg {
      width: 18px;
      height: 18px;
      fill: #6b7280;
    }

    .primary-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7e1599, #460153);
      color: rgb(255, 255, 255);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 30px rgba(99, 102, 241, 0.3);
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(99, 102, 241, 0.25);
    }

    .secondary {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #6b7280;
      font-size: 14px;
      text-decoration: none;
    }

    .secondary:hover {
      color: #1d4ed8;
    }

    .welcome-panel {
      background: linear-gradient(135deg, #c870ff 0%, #b01fff 100%);
      padding: 52px 38px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      align-items: center;
      text-align: center;
    }

    .welcome-panel h3 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.02em;
    }

    .welcome-panel h1 {
      margin: 0;
      font-size: 40px;
      letter-spacing: 0.02em;
    }

    .welcome-panel p {
      margin: 0;
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.9;
      max-width: 280px;
    }

    .social-links {
      display: flex;
      gap: 12px;
    }

    .social-links a {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.22);
      display: grid;
      place-items: center;
      color: white;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .social-links a:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 920px) {
      .container {
        grid-template-columns: 1fr;
      }
      .welcome-panel {
        padding: 38px 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <div>
        <h2>Login</h2>
        <p>Welcome back! Login to manage your appointments.</p>
      </div>

      <form id="loginForm">
        <div class="form-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.2c-3.3 0-9.9 1.7-9.9 5v2.7h19.8V19c0-3.3-6.6-5-9.9-5z"/></svg>
          <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="form-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 8h-1V6c0-2.8-2.2-5-5-5S6 3.2 6 6v2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-7-2c1.7 0 3 1.3 3 3v2H7V9c0-1.7 1.3-3 3-3zm7 14H5V10h12v10z"/></svg>
          <input type="password" id="password" placeholder="Password" required>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
          <a href="#" style="font-size: 13px; color: #6b7280; text-decoration: none;">Forgot Password?</a>
        </div>

        <button type="submit" class="primary-btn">Login</button>
      </form>
    </div>

    <div class="welcome-panel">
      <h3>Hello, Welcome to</h3>
      <h1>DENTAL CLINIC APP!</h1>
      <p>Log in to access your dashboard, book new appointments, and stay updated.</p>
      <a href="register.html" class="primary-btn" style="max-width: 200px;">Register</a>

      <div class="social-links">
        <a href="#" aria-label="Sign in with Google">G</a>
        <a href="#" aria-label="Sign in with Facebook">f</a>
        <a href="#" aria-label="Sign in with Twitter">t</a>
        <a href="#" aria-label="Sign in with LinkedIn">in</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
