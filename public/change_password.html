<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Sidebar styles are in styles.css */

    /* Main Content */
    .main-content {
      margin-left: 250px;
      padding: 20px;
      transition: margin-left 0.3s;
    }
    .sidebar.collapsed + .main-content {
      margin-left: 60px;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.1);
      padding: 28px 26px;
    }

    .card h1 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #2c3e50;
      text-align: center;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .form-field input {
      width: 165%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .form-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .form-actions button {
      min-width: 130px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .primary-btn {
      background: #6c4ef1;
      color: white;
    }

    .primary-btn:hover {
      background: #4f2ee0;
    }

    .secondary-btn {
      background: #f2f2f2;
      color: #333;
    }

    .secondary-btn:hover {
      background: #e2e2e2;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
    }

    .message.error {
      color: #e74c3c;
    }

    .message.success {
      color: #2f7a2f;
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <div class="menu-item" onclick="location.href='dashboard.html'">
        <span class="icon">🏠</span>
        <span class="text">Dashboard</span>
      </div>
      <div class="menu-item" onclick="location.href='book-appointment.html'">
        <span class="icon">📅</span>
        <span class="text">Book Appointment</span>
      </div>
      <div class="menu-item" onclick="location.href='my-appointments.html'">
        <span class="icon">📋</span>
        <span class="text">My Appointments</span>
      </div>
      <div class="menu-item active" onclick="location.href='settings.html'">
        <span class="icon">⚙️</span>
        <span class="text">Settings</span>
      </div>
      <div class="submenu">
        <div class="menu-item" onclick="location.href='faq_section.html'">
          <span class="icon">❓</span>
          <span class="text">FAQ</span>
        </div>
        <div class="menu-item" onclick="location.href='contact_help.html'">
          <span class="icon">📞</span>
          <span class="text">Help Center</span>
        </div>
      </div>
      <div class="menu-item" onclick="location.href='profile.html'">
        <span class="icon">👤</span>
        <span class="text">Profile</span>
      </div>
    </div>
    <div class="menu-item" id="logout">
      <span class="icon">🚪</span>
      <span class="text">Logout</span>
    </div>
  </div>

  <div class="main-content">
    <div class="card">
      <h1>Change Password</h1>
      <form id="changePasswordForm">
        <div class="form-field">
          <label for="currentPassword">Current Password</label>
          <input type="password" id="currentPassword" autocomplete="current-password" required />
        </div>

        <div class="form-field">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" autocomplete="new-password" required />
        </div>

        <div class="form-field">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" autocomplete="new-password" required />
        </div>

        <div class="message error" id="changePasswordError" style="display:none;"></div>
        <div class="message success" id="changePasswordSuccess" style="display:none;"></div>

        <div class="form-actions">
          <button type="button" class="secondary-btn" id="cancelChange">Cancel</button>
          <button type="submit" class="primary-btn">Update Password</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';

    // Sidebar navigation
    const sidebar = document.getElementById('sidebar');
    const menuItems = document.querySelectorAll('.menu-item');

    menuItems.forEach(item => {
      if (item.id === 'logout') return;
      item.setAttribute('tabindex', '0');
      item.setAttribute('role', 'button');

      item.addEventListener('click', () => {
        const href = item.getAttribute('onclick');
        if (href && href.includes('location.href=')) {
          const url = href.match(/location\.href='([^']+)'/)[1];
          window.location.href = url;
        }
      });

      item.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          item.click();
        }
      });
    });

    // Logout
    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = 'login.html';
    });

    // Change password
    const form = document.getElementById('changePasswordForm');
    const errorEl = document.getElementById('changePasswordError');
    const successEl = document.getElementById('changePasswordSuccess');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      successEl.style.display = 'none';
    }

    function showSuccess(message) {
      successEl.textContent = message;
      successEl.style.display = 'block';
      errorEl.style.display = 'none';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!currentPassword || !newPassword || !confirmPassword) {
        showError('All fields are required.');
        return;
      }

      if (newPassword.length < 8) {
        showError('New password must be at least 8 characters.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('New password and confirmation do not match.');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/users/me/password`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${localStorage.getItem('token')}`,
          },
          body: JSON.stringify({ currentPassword, newPassword }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => null);
          showError(data?.message || 'Unable to update password.');
          return;
        }

        showSuccess('Your password has been successfully updated.');
        form.reset();
      } catch (err) {
        console.error('Change password failed', err);
        showError('An error occurred. Please try again.');
      }
    });

    document.getElementById('cancelChange').addEventListener('click', () => {
      window.location.href = 'settings.html';
    });
  </script>
</body>
</html>
